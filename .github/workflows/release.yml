name: Release

# Tag-driven: pushing v1.2.3 builds, signs, publishes 1.2.3 to Maven Central via
# the Central Portal, and creates a GitHub release. See RELEASING.md for the
# one-time setup (namespace, GPG key, secrets) and the release procedure.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # gh release create

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          case "$VERSION" in
            *-SNAPSHOT) echo "Refusing to release a SNAPSHOT version: $VERSION" >&2; exit 1 ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build, sign, and publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew build publishToMavenCentral -Pversion="$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
