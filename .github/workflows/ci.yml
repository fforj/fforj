name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build (JDK ${{ matrix.jdk }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 21 is the library's floor (--release 21); 25 is the dev toolchain.
        # Running the suite on both proves the floor claim instead of asserting it.
        jdk: [21, 25]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build -PtoolchainJdk=${{ matrix.jdk }}
